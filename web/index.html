<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linear Algebra Visualizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
               color: #333; background: #f8f9fa; }
        header { background: #2c3e50; color: white; padding: 20px 30px; }
        header h1 { font-size: 24px; font-weight: 600; }
        header p { font-size: 14px; opacity: 0.8; margin-top: 4px; }
        nav { display: flex; gap: 8px; padding: 15px 30px; background: #fff;
              border-bottom: 1px solid #dee2e6; flex-wrap: wrap; }
        nav button { padding: 8px 16px; border: 1px solid #dee2e6; border-radius: 6px;
                     background: #fff; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        nav button:hover { background: #e9ecef; }
        nav button.active { background: #2c3e50; color: white; border-color: #2c3e50; }
        #app { padding: 20px 30px; max-width: 900px; }
        #loading { text-align: center; padding: 60px; font-size: 18px; color: #666; }
        input[type="number"], input[type="text"] { border: 1px solid #ced4da; border-radius: 4px;
            padding: 4px 8px; font-size: 14px; }
        button { padding: 6px 14px; border: 1px solid #ced4da; border-radius: 4px;
                 background: #fff; cursor: pointer; font-size: 13px; }
        button:hover { background: #e9ecef; }
        button:disabled { opacity: 0.5; cursor: default; }
        h2 { margin-bottom: 10px; font-size: 20px; }
        p { margin-bottom: 8px; line-height: 1.5; }
        table td { padding: 2px 4px; }
    </style>
</head>
<body>
    <header>
        <h1>Linear Algebra Visualizer</h1>
        <p>Interactive tools powered by C/WASM — Larson's Elementary Linear Algebra, Chapters 1–5</p>
    </header>
    <nav>
        <button class="active" data-viz="elimination">Ch.1: Elimination Stepper</button>
        <button data-viz="transform">Ch.2: Transform Playground</button>
        <button data-viz="determinant">Ch.3: Determinant Visualizer</button>
        <button data-viz="basis">Ch.4: Basis Explorer</button>
        <button data-viz="gramschmidt">Ch.5: Gram-Schmidt</button>
    </nav>
    <div id="loading">Loading WASM engine...</div>
    <div id="app" style="display:none"></div>

    <script type="module">
        import LinAlgEngine from './dist/engine.js';

        const engine = await LinAlgEngine();
        document.getElementById('loading').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        // ---- Inline visualizer code (compiled from TS sources) ----

        // Elimination Stepper
        function createEliminationStepper(engine, container) {
            container.innerHTML = `
                <h2>Elimination Stepper</h2>
                <p>Enter an augmented matrix (rows separated by semicolons, elements by commas):</p>
                <input type="text" id="elim-input" value="1,1,2,9; 2,4,-3,1; 3,6,-5,0"
                       style="width:100%;padding:8px;font-family:monospace;font-size:14px" />
                <div style="margin:10px 0">
                    <button id="elim-load">Load</button>
                    <button id="elim-step" disabled>Next Step</button>
                    <button id="elim-all" disabled>Run All</button>
                    <button id="elim-reset" disabled>Reset</button>
                </div>
                <div id="elim-matrix" style="font-family:monospace;font-size:16px;margin:10px 0"></div>
                <div id="elim-log" style="font-family:monospace;font-size:12px;color:#666;max-height:200px;overflow-y:auto"></div>
            `;
            let state = null;
            const input = container.querySelector('#elim-input');
            const stepBtn = container.querySelector('#elim-step');
            const allBtn = container.querySelector('#elim-all');
            const resetBtn = container.querySelector('#elim-reset');
            const matDiv = container.querySelector('#elim-matrix');
            const logDiv = container.querySelector('#elim-log');

            function renderMatrix() {
                if (!state) return;
                let html = '<table style="border-collapse:collapse">';
                for (let i = 0; i < state.rows; i++) {
                    html += '<tr>';
                    for (let j = 0; j < state.cols; j++) {
                        const val = engine._la_matrix_get(state.matPtr, i, j);
                        const isPivot = i === state.pivotRow && j === state.pivotCol;
                        const isAug = j === state.cols - 1;
                        let bg = 'transparent';
                        if (isPivot) bg = '#ffd700';
                        else if (i === state.pivotRow) bg = '#fff3cd';
                        const border = isAug ? 'border-left:2px solid #333;' : '';
                        html += `<td style="padding:4px 10px;text-align:right;background:${bg};${border}">${val.toFixed(4)}</td>`;
                    }
                    html += '</tr>';
                }
                matDiv.innerHTML = html + '</table>';
            }
            function log(msg) {
                state.steps.push(msg);
                logDiv.innerHTML = state.steps.map(s => '<div>' + s + '</div>').join('');
                logDiv.scrollTop = logDiv.scrollHeight;
            }
            function doStep() {
                if (!state || state.phase === 'done') return false;
                const m = state.matPtr, nv = state.cols - 1;
                if (state.phase === 'forward') {
                    while (state.pivotCol < nv && state.pivotRow < state.rows) {
                        const best = engine._la_find_pivot(m, state.pivotCol, state.pivotRow);
                        if (best < 0) { state.pivotCol++; continue; }
                        if (best !== state.pivotRow) { engine._la_swap_rows(m, state.pivotRow, best); log('R'+(state.pivotRow+1)+' ↔ R'+(best+1)); }
                        const pv = engine._la_matrix_get(m, state.pivotRow, state.pivotCol);
                        if (Math.abs(pv - 1) > 1e-9) { engine._la_scale_row(m, state.pivotRow, 1/pv); log('R'+(state.pivotRow+1)+' × '+(1/pv).toFixed(4)); }
                        for (let r = state.pivotRow + 1; r < state.rows; r++) {
                            const f = engine._la_matrix_get(m, r, state.pivotCol);
                            if (Math.abs(f) > 1e-9) { engine._la_add_scaled_row(m, r, state.pivotRow, -f); log('R'+(r+1)+' -= '+f.toFixed(4)+' × R'+(state.pivotRow+1)); }
                        }
                        state.pivotRow++; state.pivotCol++; renderMatrix(); return true;
                    }
                    state.phase = 'backward'; state.pivotRow = Math.min(state.rows, nv) - 1; log('--- Back elimination ---');
                }
                if (state.phase === 'backward') {
                    if (state.pivotRow < 0) { state.phase = 'done'; log('RREF complete!'); stepBtn.disabled = true; allBtn.disabled = true; renderMatrix(); return false; }
                    let pc = -1;
                    for (let j = 0; j < nv; j++) if (Math.abs(engine._la_matrix_get(m, state.pivotRow, j)) > 1e-9) { pc = j; break; }
                    if (pc >= 0) for (let r = state.pivotRow - 1; r >= 0; r--) {
                        const f = engine._la_matrix_get(m, r, pc);
                        if (Math.abs(f) > 1e-9) { engine._la_add_scaled_row(m, r, state.pivotRow, -f); log('R'+(r+1)+' -= '+f.toFixed(4)+' × R'+(state.pivotRow+1)); }
                    }
                    state.pivotRow--; renderMatrix(); return true;
                }
                return false;
            }
            container.querySelector('#elim-load').addEventListener('click', () => {
                if (state) engine._la_matrix_free(state.matPtr);
                const rowStrs = input.value.split(';').map(s => s.trim()).filter(s => s);
                const data = []; let rows = rowStrs.length, cols = 0;
                for (const rs of rowStrs) { const nums = rs.split(',').map(Number); cols = nums.length; data.push(...nums); }
                const buf = engine._malloc(data.length * 8);
                for (let i = 0; i < data.length; i++) engine.HEAPF64[buf/8+i] = data[i];
                const ptr = engine._la_matrix_from_array(rows, cols, buf); engine._free(buf);
                state = { matPtr: ptr, rows, cols, pivotRow: 0, pivotCol: 0, phase: 'forward', steps: [] };
                stepBtn.disabled = false; allBtn.disabled = false; resetBtn.disabled = false;
                logDiv.innerHTML = ''; log('Matrix loaded.'); renderMatrix();
            });
            stepBtn.addEventListener('click', () => doStep());
            allBtn.addEventListener('click', () => { while (doStep()) {} });
            resetBtn.addEventListener('click', () => container.querySelector('#elim-load').click());
        }

        // Transform Playground
        function createTransformPlayground(engine, container) {
            container.innerHTML = `
                <h2>Transform Playground</h2>
                <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
                    <canvas id="tf-canvas" width="500" height="500" style="border:1px solid #ccc;background:#fafafa"></canvas>
                    <div>
                        <p>2×2 Matrix:</p>
                        <table><tr><td><input type="number" id="m00" value="1" step="0.1" style="width:60px"/></td>
                        <td><input type="number" id="m01" value="0" step="0.1" style="width:60px"/></td></tr>
                        <tr><td><input type="number" id="m10" value="0" step="0.1" style="width:60px"/></td>
                        <td><input type="number" id="m11" value="1" step="0.1" style="width:60px"/></td></tr></table>
                        <p id="det-display" style="font-family:monospace;margin-top:10px">det = 1.0000</p>
                        <label><input type="checkbox" id="show-vec" checked/> Show column vectors</label>
                        <div style="margin-top:10px">
                            <button id="p-rot">Rot 45°</button> <button id="p-shear">Shear</button>
                            <button id="p-ref">Reflect</button> <button id="p-scale">Scale 2×</button>
                        </div>
                    </div>
                </div>`;
            const canvas = container.querySelector('#tf-canvas'), ctx = canvas.getContext('2d');
            const m00=container.querySelector('#m00'),m01=container.querySelector('#m01'),m10=container.querySelector('#m10'),m11=container.querySelector('#m11');
            const detD=container.querySelector('#det-display'),showV=container.querySelector('#show-vec');
            const S=60,CX=250,CY=250;
            function ts(x,y){return[CX+x*S,CY-y*S]}
            function draw(){
                const a=+m00.value||0,b=+m01.value||0,c=+m10.value||0,d=+m11.value||0;
                const buf=engine._malloc(32);engine.HEAPF64[buf/8]=a;engine.HEAPF64[buf/8+1]=b;engine.HEAPF64[buf/8+2]=c;engine.HEAPF64[buf/8+3]=d;
                const ptr=engine._la_matrix_from_array(2,2,buf);const det=engine._la_det_elimination(ptr);engine._la_matrix_free(ptr);engine._free(buf);
                detD.textContent='det = '+det.toFixed(4)+' (area: '+Math.abs(det).toFixed(4)+')';
                ctx.clearRect(0,0,500,500);
                ctx.strokeStyle='#eee';ctx.lineWidth=1;for(let i=-4;i<=4;i++){ctx.beginPath();ctx.moveTo(...ts(i,-4));ctx.lineTo(...ts(i,4));ctx.stroke();ctx.beginPath();ctx.moveTo(...ts(-4,i));ctx.lineTo(...ts(4,i));ctx.stroke();}
                ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(500,CY);ctx.stroke();ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,500);ctx.stroke();
                const sq=[[0,0],[1,0],[1,1],[0,1]];
                ctx.strokeStyle='rgba(0,0,255,0.3)';ctx.fillStyle='rgba(0,0,255,0.05)';ctx.lineWidth=2;ctx.beginPath();sq.forEach((p,i)=>{const s=ts(p[0],p[1]);i===0?ctx.moveTo(...s):ctx.lineTo(...s)});ctx.closePath();ctx.fill();ctx.stroke();
                const tsq=sq.map(([x,y])=>[a*x+b*y,c*x+d*y]);
                ctx.strokeStyle='rgba(255,50,50,0.8)';ctx.fillStyle=det>=0?'rgba(255,50,50,0.15)':'rgba(255,50,50,0.3)';ctx.lineWidth=2.5;ctx.beginPath();tsq.forEach((p,i)=>{const s=ts(p[0],p[1]);i===0?ctx.moveTo(...s):ctx.lineTo(...s)});ctx.closePath();ctx.fill();ctx.stroke();
                if(showV.checked){
                    const da=(ex,ey,col,l)=>{const[sx,sy]=ts(0,0),[esx,esy]=ts(ex,ey);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(esx,esy);ctx.stroke();const ang=Math.atan2(sy-esy,esx-sx);ctx.beginPath();ctx.moveTo(esx,esy);ctx.lineTo(esx-10*Math.cos(ang-.3),esy+10*Math.sin(ang-.3));ctx.lineTo(esx-10*Math.cos(ang+.3),esy+10*Math.sin(ang+.3));ctx.closePath();ctx.fill();ctx.font='13px sans-serif';ctx.fillText(l,esx+5,esy-5)};
                    da(a,c,'#d63384','col₁');da(b,d,'#0d6efd','col₂');
                }
            }
            [m00,m01,m10,m11,showV].forEach(e=>e.addEventListener('input',draw));
            const sm=(a,b,c,d)=>{m00.value=a;m01.value=b;m10.value=c;m11.value=d;draw()};
            const r=Math.cos(Math.PI/4).toFixed(4),s=Math.sin(Math.PI/4).toFixed(4);
            container.querySelector('#p-rot').addEventListener('click',()=>sm(r,'-'+s,s,r));
            container.querySelector('#p-shear').addEventListener('click',()=>sm(1,1,0,1));
            container.querySelector('#p-ref').addEventListener('click',()=>sm(1,0,0,-1));
            container.querySelector('#p-scale').addEventListener('click',()=>sm(2,0,0,2));
            draw();
        }

        // Determinant Visualizer
        function createDetVisualizer(engine, container) {
            container.innerHTML = `
                <h2>Determinant Visualizer</h2>
                <p>Drag vector endpoints. Parallelogram area = |det|.</p>
                <canvas id="det-canvas" width="500" height="500" style="border:1px solid #ccc;background:#fafafa;cursor:crosshair"></canvas>
                <p id="det-info" style="font-family:monospace;font-size:14px"></p>`;
            const canvas=container.querySelector('#det-canvas'),ctx=canvas.getContext('2d'),info=container.querySelector('#det-info');
            const S=60,CX=250,CY=250;let vecs=[[2,1],[1,2]],drag=-1;
            function ts(x,y){return[CX+x*S,CY-y*S]}function fs(sx,sy){return[(sx-CX)/S,(CY-sy)/S]}
            function draw(){
                const[u,v]=vecs;const buf=engine._malloc(32);engine.HEAPF64[buf/8]=u[0];engine.HEAPF64[buf/8+1]=v[0];engine.HEAPF64[buf/8+2]=u[1];engine.HEAPF64[buf/8+3]=v[1];
                const ptr=engine._la_matrix_from_array(2,2,buf);const det=engine._la_det_elimination(ptr);engine._la_matrix_free(ptr);engine._free(buf);
                ctx.clearRect(0,0,500,500);
                ctx.strokeStyle='#eee';for(let i=-4;i<=4;i++){ctx.beginPath();ctx.moveTo(...ts(i,-4));ctx.lineTo(...ts(i,4));ctx.stroke();ctx.beginPath();ctx.moveTo(...ts(-4,i));ctx.lineTo(...ts(4,i));ctx.stroke();}
                ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(500,CY);ctx.stroke();ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,500);ctx.stroke();
                const pts=[ts(0,0),ts(u[0],u[1]),ts(u[0]+v[0],u[1]+v[1]),ts(v[0],v[1])];
                ctx.fillStyle=Math.abs(det)<.01?'rgba(255,0,0,0.1)':'rgba(100,200,100,0.2)';ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.beginPath();pts.forEach((p,i)=>i===0?ctx.moveTo(...p):ctx.lineTo(...p));ctx.closePath();ctx.fill();ctx.stroke();
                const dv=(vec,col,l)=>{const[sx,sy]=ts(0,0),[ex,ey]=ts(vec[0],vec[1]);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();ctx.beginPath();ctx.arc(ex,ey,6,0,Math.PI*2);ctx.fill();ctx.font='14px sans-serif';ctx.fillText(l,ex+10,ey-10)};
                dv(u,'#d63384','u('+u[0].toFixed(1)+','+u[1].toFixed(1)+')');dv(v,'#0d6efd','v('+v[0].toFixed(1)+','+v[1].toFixed(1)+')');
                info.textContent='det = '+det.toFixed(4)+' | Area = '+Math.abs(det).toFixed(4)+(Math.abs(det)<.01?' ⚠ Nearly parallel!':'');
            }
            canvas.addEventListener('mousedown',e=>{const r=canvas.getBoundingClientRect(),[mx,my]=fs(e.clientX-r.left,e.clientY-r.top);for(let i=0;i<2;i++){const dx=mx-vecs[i][0],dy=my-vecs[i][1];if(dx*dx+dy*dy<.3){drag=i;return}}});
            canvas.addEventListener('mousemove',e=>{if(drag<0)return;const r=canvas.getBoundingClientRect(),[mx,my]=fs(e.clientX-r.left,e.clientY-r.top);vecs[drag]=[Math.round(mx*4)/4,Math.round(my*4)/4];draw()});
            canvas.addEventListener('mouseup',()=>{drag=-1});canvas.addEventListener('mouseleave',()=>{drag=-1});
            draw();
        }

        // Basis Explorer
        function createBasisExplorer(engine, container) {
            container.innerHTML = `
                <h2>Basis Explorer</h2>
                <p>Set custom basis vectors and click canvas to see coordinates in both bases.</p>
                <div style="display:flex;gap:20px;flex-wrap:wrap">
                    <canvas id="basis-canvas" width="500" height="500" style="border:1px solid #ccc;background:#fafafa;cursor:crosshair"></canvas>
                    <div>
                        <p><b>b₁:</b> <input type="number" id="b1x" value="1" step=".5" style="width:50px"/> <input type="number" id="b1y" value="0.5" step=".5" style="width:50px"/></p>
                        <p><b>b₂:</b> <input type="number" id="b2x" value="0" step=".5" style="width:50px"/> <input type="number" id="b2y" value="1" step=".5" style="width:50px"/></p>
                        <div id="basis-coords" style="font-family:monospace;margin-top:15px;line-height:1.8"></div>
                    </div>
                </div>`;
            const canvas=container.querySelector('#basis-canvas'),ctx=canvas.getContext('2d');
            const b1x=container.querySelector('#b1x'),b1y=container.querySelector('#b1y'),b2x=container.querySelector('#b2x'),b2y=container.querySelector('#b2y');
            const cd=container.querySelector('#basis-coords');const S=60,CX=250,CY=250;let pt=[2,1.5];
            function ts(x,y){return[CX+x*S,CY-y*S]}
            function draw(){
                const bv1=[+b1x.value||0,+b1y.value||0],bv2=[+b2x.value||0,+b2y.value||0];
                ctx.clearRect(0,0,500,500);
                ctx.strokeStyle='#eee';ctx.lineWidth=1;for(let i=-4;i<=4;i++){ctx.beginPath();ctx.moveTo(...ts(i,-4));ctx.lineTo(...ts(i,4));ctx.stroke();ctx.beginPath();ctx.moveTo(...ts(-4,i));ctx.lineTo(...ts(4,i));ctx.stroke();}
                ctx.lineWidth=.5;for(let t=-5;t<=5;t++){ctx.strokeStyle='rgba(214,51,132,0.2)';ctx.beginPath();ctx.moveTo(...ts(t*bv1[0]-5*bv2[0],t*bv1[1]-5*bv2[1]));ctx.lineTo(...ts(t*bv1[0]+5*bv2[0],t*bv1[1]+5*bv2[1]));ctx.stroke();ctx.strokeStyle='rgba(13,110,253,0.2)';ctx.beginPath();ctx.moveTo(...ts(t*bv2[0]-5*bv1[0],t*bv2[1]-5*bv1[1]));ctx.lineTo(...ts(t*bv2[0]+5*bv1[0],t*bv2[1]+5*bv1[1]));ctx.stroke();}
                ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(500,CY);ctx.stroke();ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,500);ctx.stroke();
                const da=(v,col,l)=>{const[sx,sy]=ts(0,0),[ex,ey]=ts(v[0],v[1]);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();ctx.beginPath();ctx.arc(ex,ey,4,0,Math.PI*2);ctx.fill();ctx.font='13px sans-serif';ctx.fillText(l,ex+5,ey-5)};
                da(bv1,'#d63384','b₁');da(bv2,'#0d6efd','b₂');
                const[px,py]=ts(pt[0],pt[1]);ctx.fillStyle='#333';ctx.beginPath();ctx.arc(px,py,5,0,Math.PI*2);ctx.fill();
                const det=bv1[0]*bv2[1]-bv1[1]*bv2[0];let bc='singular!';
                if(Math.abs(det)>1e-9){const buf=engine._malloc(32);engine.HEAPF64[buf/8]=bv1[0];engine.HEAPF64[buf/8+1]=bv2[0];engine.HEAPF64[buf/8+2]=bv1[1];engine.HEAPF64[buf/8+3]=bv2[1];const bm=engine._la_matrix_from_array(2,2,buf);const inv=engine._la_matrix_inverse(bm);engine._free(buf);if(inv){const c1=engine._la_matrix_get(inv,0,0)*pt[0]+engine._la_matrix_get(inv,0,1)*pt[1];const c2=engine._la_matrix_get(inv,1,0)*pt[0]+engine._la_matrix_get(inv,1,1)*pt[1];bc='('+c1.toFixed(3)+', '+c2.toFixed(3)+')';engine._la_matrix_free(inv)}engine._la_matrix_free(bm)}
                cd.innerHTML='<b>Standard:</b> ('+pt[0].toFixed(3)+', '+pt[1].toFixed(3)+')<br/><b>Custom basis:</b> '+bc;
            }
            canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();pt=[(e.clientX-r.left-CX)/S,(CY-(e.clientY-r.top))/S];draw()});
            [b1x,b1y,b2x,b2y].forEach(e=>e.addEventListener('input',draw));draw();
        }

        // Gram-Schmidt
        function createGramSchmidtViz(engine, container) {
            container.innerHTML = `
                <h2>Gram-Schmidt Orthonormalization</h2>
                <p>Enter 2D vectors and step through the process.</p>
                <div style="display:flex;gap:20px;flex-wrap:wrap">
                    <canvas id="gs-canvas" width="500" height="500" style="border:1px solid #ccc;background:#fafafa"></canvas>
                    <div>
                        <p><b>v₁:</b> <input type="number" id="v1x" value="2" step=".5" style="width:50px"/> <input type="number" id="v1y" value="1" step=".5" style="width:50px"/></p>
                        <p><b>v₂:</b> <input type="number" id="v2x" value="1" step=".5" style="width:50px"/> <input type="number" id="v2y" value="2" step=".5" style="width:50px"/></p>
                        <div style="margin:10px 0"><button id="gs-step">Next Step</button> <button id="gs-reset">Reset</button></div>
                        <div id="gs-log" style="font-family:monospace;font-size:12px;line-height:1.6;max-height:300px;overflow-y:auto"></div>
                    </div>
                </div>`;
            const canvas=container.querySelector('#gs-canvas'),ctx=canvas.getContext('2d'),logDiv=container.querySelector('#gs-log');
            const v1x=container.querySelector('#v1x'),v1y=container.querySelector('#v1y'),v2x=container.querySelector('#v2x'),v2y=container.querySelector('#v2y');
            const S=80,CX=250,CY=250;let step=0,u1=[],u2=[],proj=[],logs=[];
            function ts(x,y){return[CX+x*S,CY-y*S]}
            function da(from,to,col,l,dsh=false){const[sx,sy]=ts(from[0],from[1]),[ex,ey]=ts(to[0],to[1]);ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=2.5;if(dsh)ctx.setLineDash([5,5]);else ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();ctx.setLineDash([]);const ang=Math.atan2(sy-ey,ex-sx);ctx.beginPath();ctx.moveTo(ex,ey);ctx.lineTo(ex-8*Math.cos(ang-.3),ey+8*Math.sin(ang-.3));ctx.lineTo(ex-8*Math.cos(ang+.3),ey+8*Math.sin(ang+.3));ctx.closePath();ctx.fill();ctx.font='13px sans-serif';ctx.fillText(l,ex+8,ey-8)}
            function draw(){
                const v1=[+v1x.value||0,+v1y.value||0],v2=[+v2x.value||0,+v2y.value||0];
                ctx.clearRect(0,0,500,500);ctx.strokeStyle='#eee';ctx.lineWidth=1;for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(...ts(i,-3));ctx.lineTo(...ts(i,3));ctx.stroke();ctx.beginPath();ctx.moveTo(...ts(-3,i));ctx.lineTo(...ts(3,i));ctx.stroke();}
                ctx.strokeStyle='#999';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,CY);ctx.lineTo(500,CY);ctx.stroke();ctx.beginPath();ctx.moveTo(CX,0);ctx.lineTo(CX,500);ctx.stroke();
                da([0,0],v1,'rgba(214,51,132,0.3)','v₁',true);da([0,0],v2,'rgba(13,110,253,0.3)','v₂',true);
                if(step>=1&&u1.length)da([0,0],u1,'#d63384','u₁('+u1[0].toFixed(2)+','+u1[1].toFixed(2)+')');
                if(step>=2&&proj.length){da([0,0],proj,'#ffc107','proj',true);ctx.strokeStyle='rgba(255,193,7,0.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(...ts(v2[0],v2[1]));ctx.lineTo(...ts(proj[0],proj[1]));ctx.stroke();ctx.setLineDash([])}
                if(step>=3&&u2.length)da([0,0],u2,'#0d6efd','u₂('+u2[0].toFixed(2)+','+u2[1].toFixed(2)+')');
                logDiv.innerHTML=logs.map(l=>'<div>'+l+'</div>').join('');
            }
            function doStep(){
                const v1=[+v1x.value||0,+v1y.value||0],v2=[+v2x.value||0,+v2y.value||0];
                step++;
                if(step===1){const n=Math.sqrt(v1[0]**2+v1[1]**2);u1=n>1e-9?[v1[0]/n,v1[1]/n]:[0,0];logs.push('Step 1: u₁ = v₁/||v₁|| = ('+u1[0].toFixed(4)+', '+u1[1].toFixed(4)+')');}
                else if(step===2){const d=v2[0]*u1[0]+v2[1]*u1[1];proj=[d*u1[0],d*u1[1]];logs.push('Step 2: proj = (v₂·u₁)u₁ = ('+proj[0].toFixed(4)+', '+proj[1].toFixed(4)+')');}
                else if(step===3){const w=[v2[0]-proj[0],v2[1]-proj[1]];const n=Math.sqrt(w[0]**2+w[1]**2);u2=n>1e-9?[w[0]/n,w[1]/n]:[0,0];const dot=u1[0]*u2[0]+u1[1]*u2[1];logs.push('Step 3: u₂ = normalize(v₂ - proj) = ('+u2[0].toFixed(4)+', '+u2[1].toFixed(4)+')');logs.push('Verify: u₁·u₂ = '+dot.toFixed(9)+' ≈ 0 ✓');}
                draw();
            }
            container.querySelector('#gs-step').addEventListener('click',()=>{if(step<3)doStep()});
            container.querySelector('#gs-reset').addEventListener('click',()=>{step=0;u1=[];u2=[];proj=[];logs=[];draw()});
            [v1x,v1y,v2x,v2y].forEach(e=>e.addEventListener('input',()=>{step=0;u1=[];u2=[];proj=[];logs=[];draw()}));
            draw();
        }

        // ---- Navigation ----
        const app = document.getElementById('app');
        const vizMap = {
            elimination: createEliminationStepper,
            transform: createTransformPlayground,
            determinant: createDetVisualizer,
            basis: createBasisExplorer,
            gramschmidt: createGramSchmidtViz,
        };

        function loadViz(name) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-viz="${name}"]`).classList.add('active');
            vizMap[name](engine, app);
        }

        document.querySelectorAll('nav button').forEach(btn => {
            btn.addEventListener('click', () => loadViz(btn.dataset.viz));
        });

        loadViz('elimination');
    </script>
</body>
</html>
